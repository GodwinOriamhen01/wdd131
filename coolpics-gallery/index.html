<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolpics Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Gallery</h1>

<section class="gallery">
    <figure>  
        <img src="images/images/book-sm.jpg" data-full="images/book-lg.jpg" alt="person reading a book">
    </figure>
    <figure>  
        <img src="images/images/couch-sm.jpg" data-full="images/couch-lg.jpg" alt="person sitting on a couch with a phone">
    </figure>
    <figure>  
        <img src="images/images/desk-sm.jpg" data-full="images/desk-lg.jpg" alt="a work desktop">
    </figure>
    <figure>  
        <img src="images/images/keyboard-sm.jpg" data-full="images/keyboard-lg.jpg" alt="person typing on a keyboard">
    </figure>
    <figure>  
        <img src="images/images/phone-sm.jpg" data-full="images/phone-lg.jpg" alt="person looking at a phone">
    </figure>
    <figure>  
        <img src="images/images/sit-sm.jpg" data-full="images/sit-lg.jpg" alt="person sitting on a couch">
    </figure>
</section>

<dialog id="viewer">
    <img id="viewer-img" alt="">
    <button class="close-viewer">X</button>
</dialog>

<script src="script.js"></script>
</body>
</html>
