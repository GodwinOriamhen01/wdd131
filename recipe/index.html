<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBook</title>

    <!-- Social Media Meta Tags -->
    <meta property="og:title" content="RecipeBook - Simple and Delicious Recipes" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Find delicious and easy-to-make recipes on RecipeBook!" />
    <meta property="og:image" content="images/recipe-book.png" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="stylesheet" href="recipes.css" />
  </head>

  <body>
    <header>
      <img src="images/recipe-book.png" alt="Recipe Book logo" />
      <h1>RecipeBook</h1>
    </header>

    <main>
      <!-- Search Form -->
      <form class="search-form">
        <input type="text" placeholder="Find a recipe" aria-label="Search recipes" />
        <button type="submit" aria-label="Search">&#128269;</button>
      </form>

      <!-- Recipe Card -->
      <section class="recipe">
        <img src="images/apple-crisp.jpg" alt="Apple Crisp dessert" />
        <div class="recipe-info">
          <span class="tag">dessert</span>
          <h2><a href="#">Apple Crisp</a></h2>
          <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars"
          >
            <span aria-hidden="true">⭐</span>
            <span aria-hidden="true">⭐</span>
            <span aria-hidden="true">⭐</span>
            <span aria-hidden="true">⭐</span>
            <span aria-hidden="true">☆</span>
          </span>
          <p class="description">
            This apple crisp recipe is a simple yet delicious fall dessert
            that's great served warm with vanilla ice cream.
          </p>
        </div>
      </section>
    </main>

    <footer>
      <p class="attribution">
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons"
          >Recipe icons created by Freepik - Flaticon</a
        >
      </p>

      <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" /></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" /></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" /></a>
      </div>
    </footer>
    <script src="recipes.js"></script>
  </body>
</html>
