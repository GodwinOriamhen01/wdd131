<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card - Snortleblat</title>

    <!-- Social Media Meta Information -->
    <meta property="og:title" content="Snortleblat - Swamp Beast Diplomat">
    <meta property="og:description" content="A powerful swamp beast diplomat with dynamic stats.">
    <meta property="og:image" content="images/snortleblat.png">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Snortleblat - Character Card">
    <meta name="twitter:image" content="images/snortleblat.png">

    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

    <main class="card">
        <img class="image" src="images/snortscreenshot.png" alt="Character Image">

        <div class="name">Snortleblat</div>

        <div class="stats">
            <p><strong>Class:</strong> <span id="char-class">Swamp Beast Diplomat</span></p>
            <p><strong>Level:</strong> <span id="char-level">5</span></p>
            <p><strong>Health:</strong> <span id="char-health">100</span></p>
        </div>

        <div class="buttons">
            <button id="attack-btn">Attacked</button>
            <button id="level-btn">Level Up</button>
        </div>

        <p id="status"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
