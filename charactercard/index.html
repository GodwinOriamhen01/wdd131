<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>

    <!-- Social Media Meta Tags -->
    <meta property="og:title" content="Snortleblat - Character Card">
    <meta property="og:description" content="A fantasy character card built for WDD131.">
    <meta property="og:image" content="images/snortleblat.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="card">
        <img id="char-img" src="images/imagenow.png" alt="Character Image">

        <h1 id="char-name">Snortleblat</h1>

        <p><strong>Class:</strong> <span id="char-class">Swamp Beast Diplomat</span></p>
        <p><strong>Level:</strong> <span id="char-level">8</span></p>
        <p><strong>Health:</strong> <span id="char-health">100</span></p>

        <div class="buttons">
            <button id="attack-btn">Attacked</button>
            <button id="level-btn">Level Up</button>
        </div>

        <p id="status"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
